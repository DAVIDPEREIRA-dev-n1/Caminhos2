<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<link rel="shortcut icon" href="favicon2.ico" type="image/x-icon">
<title>CLASSIFIED GALLERY</title>

<style>
  body {
    margin: 0;
    font-family: "Courier New", monospace;
    background: #0b0f14;
    color: #e6e6e6;
    text-align: center;
    overflow-x: hidden;
  }

  /* fundo estilo “terminal / dossiê” */
  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.03),
      rgba(255,255,255,0.03) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
  }

  h1 {
    margin-top: 30px;
    font-size: 42px;
    letter-spacing: 4px;
    color: #ff3b3b;
  }

  h2 {
    color: #aaa;
    font-weight: normal;
    margin-bottom: 20px;
  }

  .stamp {
    display: inline-block;
    margin: 10px auto 25px;
    padding: 8px 14px;
    border: 2px solid #ff3b3b;
    color: #ff3b3b;
    font-size: 14px;
    transform: rotate(-5deg);
    letter-spacing: 2px;
  }

  /* galeria estilo ficheiros */
  .galeria {
    display: flex;
    gap: 18px;
    overflow-x: auto;
    padding: 20px;
  }

  .galeria::-webkit-scrollbar {
    display: none;
  }

  .galeria img {
    min-width: 240px;
    height: 240px;
    object-fit: cover;
    border: 2px solid #2b2f36;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
    filter: grayscale(20%) contrast(110%);
  }

  .galeria img:hover {
    transform: scale(1.05);
    border-color: #ff3b3b;
    filter: grayscale(0%);
  }

  /* botões tipo interface militar */
  .btn {
    background: #111;
    border: 1px solid #444;
    color: #fff;
    padding: 8px 12px;
    cursor: pointer;
    margin: 10px;
  }

  .btn:hover {
    border-color: #ff3b3b;
    color: #ff3b3b;
  }

  /* lightbox “arquivo aberto” */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    justify-content: center;
    align-items: center;
  }

  .lightbox img {
    max-width: 90%;
    max-height: 90%;
    border: 3px solid #ff3b3b;
  }

  .classified {
    margin-top: 25px;
    font-size: 12px;
    color: #666;
    letter-spacing: 3px;
  }
</style>
</head>

<body>

<div class="scanlines"></div>

<div class="lightbox" id="lightbox" onclick="closeImg()">

<script>
  function scrollGal(x) {
    document.getElementById("galeria").scrollBy({ left: x, behavior: "smooth" });
  }

  function openImg(img) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("bigImg").src = img.src;
  }

  function closeImg() {
    document.getElementById("lightbox").style.display = "none";
  }
</script>
