<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon2.ico" type="image/x-icon">
    <title>Candidaturas-JUVENTUDE</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: url('fundo.jpg') no-repeat center center fixed;
            background-size: cover;
            padding-top: 40px;
        }

        .titulo-topo {
            color: rgb(77, 72, 72); 
            font-size: clamp(24px, 6vw, 45px);
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5); 
            margin-bottom: 30px;
        }

        .janela-principal {
            background-color: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0px 20px 40px rgba(0, 0, 0, 0.4);
            max-width: 420px;
            width: 90%;
            text-align: center;
        }

        .btn-download-img {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #007bff;
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-download-img:hover {
            background-color: #0056b3;
            transform: scale(1.02);
        }

        .img-botao {
            width: 70px;
            height: auto;
            margin-bottom: 10px;
        }

        .texto-botao {
            font-size: 16px;
            font-weight: bold;
        }

        .btn-upload {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #28a745;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            border: none;
            margin-top: 20px;
            box-sizing: border-box;
        }

        #input-file { display: none; }

        .btn-confirmar {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: #f9f9f9;
        }
    </style>
</head>
<body>

   
    <h1 class="titulo-topo">Candidaturas Juventude</h1>

    <div class="janela-principal">
        
        
         <img src="favicon2.ico" alt="Baixar" class="img-botao">
        <a href="FORMULARIO_PRACA juventude (3).docx" download class="btn-download-img">
            <span class="texto-botao">CLIQUE AQUI PARA BAIXAR O FORMULÁRIO</span>
        </a>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">

      
        <form>
            <p style="font-size: 14px; color: #666;">Já preencheu? Envie o ficheiro aqui:</p>
            <label for="input-file" class="btn-upload">
                Selecionar Ficheiro
            </label>
            <input type="file" id="input-file">
            
            <button type="submit" class="btn-confirmar">Confirmar Envio</button>
        </form>
    </div>

</body>
</html>
